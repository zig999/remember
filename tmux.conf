# =========================
# BASE
# =========================

set -g mouse on
set -g history-limit 100000
set -g base-index 0
setw -g pane-base-index 0
set -g renumber-windows on

# =========================
# TERMINAL / ROBUSTEZ
# =========================

# Sem lag ao usar Esc (Vim etc.) — padrão é 500ms
set -sg escape-time 10
# Apps internos (Vim, watchers) sabem quando a pane ganha/perde foco
set -g focus-events on
# OSC52: copiar no tmux vai para o clipboard do Windows (WSL2 + Windows Terminal)
set -g set-clipboard on
# Mensagens (ex.: reload) ficam visíveis ~2s em vez de 750ms
set -g display-time 2000

# Cores verdadeiras (truecolor / RGB) — Windows Terminal suporta
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"

# =========================
# STATUS BAR
# =========================

set -g status on
set -g status-interval 2
set -g status-position bottom
set -g status-justify left

set -g status-left-length 40
set -g status-right-length 120

set -g status-style "bg=black,fg=white"

set -g status-left "#[fg=green,bold]session:#S "
# Badge de PREFIXO: aparece só enquanto o Ctrl+b está armado (aguardando a próxima tecla)
set -g status-right "#{?client_prefix,#[bg=red#,fg=white#,bold] PREFIX #[default] ,}#[fg=yellow]pane:#T #[fg=cyan]cmd:#{pane_current_command} #[fg=white]| %Y-%m-%d %H:%M "

# =========================
# WINDOWS
# =========================

setw -g window-status-format " #I:#W "
setw -g window-status-current-format " #[fg=black,bg=green,bold]#I:#W "
setw -g window-status-style "fg=white,bg=black"
setw -g window-status-current-style "fg=black,bg=green,bold"

# =========================
# PANES
# =========================

# Esmaece panes inativas e destaca a ativa (maior ganho visual de foco)
set -g window-style        "fg=colour245,bg=colour234"   # inativa: esmaecida
set -g window-active-style "fg=colour252,bg=colour233"   # ativa: brilhante

set -g pane-border-style "fg=colour240"
# Borda da pane ativa: verde normalmente, amarela enquanto o prefixo (Ctrl+b) está armado
set -g pane-active-border-style "#{?client_prefix,fg=yellow#,bold,fg=green}"

# Linhas de borda mais marcadas e indicador visual da pane ativa (tmux 3.2+)
set -g pane-border-lines heavy
set -g pane-border-indicators both

# Mostra o título da pane na borda superior/inferior da pane (+ nº da pane e flag de zoom)
set -g pane-border-status top
set -g pane-border-format " #[fg=cyan]#P:#T #[fg=white]| #{pane_current_command}#{?window_zoomed_flag, #[fg=yellow]🔍 ZOOM,} "

# =========================
# NAVEGAÇÃO MAIS CONFORTÁVEL
# =========================

bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Splits intuitivos que herdam o diretório atual da pane (padrão abriria em $HOME)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Copy-mode estilo vi (seleção com v, cópia com y)
setw -g mode-keys vi

# =========================
# RELOAD
# =========================

bind r source-file "$HOME/projects/eternal/tmux.conf" \; display-message "tmux.conf recarregado"