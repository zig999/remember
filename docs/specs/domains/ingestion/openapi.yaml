openapi: "3.0.3"
info:
  title: "Remember — Ingestion Domain API"
  version: "1.2.2"
  description: |
    REST contract for the ingestion domain of the Remember system.

    Scope: receive unstructured raw information, persist it immutably, perform
    deterministic chunking (chunking_version `v1`), open and audit `LLMRun`s,
    drive the LLM-driven extraction synchronously and in-process via the
    Anthropic SDK tool-use loop (UC-12), expose the four `ingest` propose-*
    operations through a **dual-transport** surface (REST mirrors AND MCP
    tools), and expose the produced raw/chunk/run/tool-call artifacts for
    the SPA.

    Dual-transport `ingest` toolset (v1.2.0 — documented departure from v7
    §14 / A28, recorded in `CLAUDE.md`): the four propose-* operations
    (`proposeFragment`, `proposeNode`, `proposeLink`, `proposeAttribute`) are
    exposed both as REST mirrors (`POST /api/v1/ingest/llm-runs/{llmRunId}/propose-*`)
    AND as MCP tools (§14.1 of the normative source v7), invoking the **same**
    transport-agnostic service functions. The REST mirrors enable manual
    replay / simulation by the Owner; the MCP tools remain available to LLM
    extractors that connect through MCP. The in-process extraction
    orchestrator of UC-12 invokes the same service functions without any
    transport hop. The Zod input schemas are the single source of truth —
    the JSON Schemas exposed via MCP and the Anthropic SDK tool definitions
    are derived from them via `zod-to-json-schema` (BR-21).

    UC-12 (`runLlmExtraction`) triggers the synchronous in-process extraction
    over a `running` `LLMRun`: the orchestrator iterates the run's chunks in
    `chunk_index` order, runs a manual tool-use loop against the Anthropic
    Messages API per chunk, and closes the run (`completed` or `failed`) on
    exit. The HTTP request stays open for the entire run (LLM-bound minutes
    per document acceptable at v1 scale — §16).

    Source of truth: `remember-modelagem-v7.md` (§3.1, §3.2, §3.5, §4, §6.5,
    §8, §9, §11, §13, §14.1). Database schema: `migrations/0001_init.sql`
    (single bootstrap migration; v1.2.0 introduces no schema change).

    Authentication (§2.5, A29): every endpoint requires a valid Neon Auth (Stack Auth)
    JWT, verified in the BFF middleware. The service key never leaves the BFF.
    Single-owner model — no `User` entity, no role-based authorization.

    MCP-only siblings (no REST mirror — described here for cross-reference,
    not part of this OpenAPI surface): `ingest_document` (BR-30, synchronous
    composition of UC-01 + UC-12 — awaits the full extraction), the read-only
    operational tools `health` / `get_ingestion_status` / `list_recent_ingestions`
    (BR-31, polling channel after a client timeout), and the new
    `start_async_ingestion` (BR-32, UC-13 — fires extraction as a detached
    background promise and returns immediately with `run_status: 'running'`,
    rollout-flag-guarded by `env.CHAT_INGEST_ENABLED`). These five MCP tools
    are advertised by `POST /api/v1/mcp/ingest` and by the local stdio MCP
    transport; their REST equivalents are UC-01 + UC-12 + the polling reads
    on the LLMRun endpoints below. A REST caller that wants async ingestion
    simply calls `POST /api/v1/ingest/raw-information` and skips the
    `POST /api/v1/ingest/llm-runs/:id/run` step.

servers:
  - url: "http://localhost:3000"
    description: "Local development BFF"
  - url: "https://{host}"
    description: "Production BFF"
    variables:
      host:
        default: "api.segundo-cerebro.example"

tags:
  - name: "raw-information"
    description: "Immutable original documents received by the system (§3.1)."
  - name: "raw-chunks"
    description: "Deterministic slices of raw documents, anchors of provenance (§3.1, §9.2)."
  - name: "llm-runs"
    description: "LLM extraction sessions and their audit trail (§3.5, §8, §9)."
  - name: "ingest-propose"
    description: |
      REST mirrors of the MCP `ingest` toolset (UC-08..UC-11, v1.2.0). Same
      service implementation, same envelope shape, same business semantics —
      only the transport differs. Intended for human-driven replay /
      simulation by the Owner; LLM extractors normally use the MCP transport
      or the in-process orchestrator (UC-12).

security:
  - bearerAuth: []

paths:

  /api/v1/ingest/raw-information:
    post:
      tags: ["raw-information"]
      operationId: ingestRawInformation
      summary: "Receive a raw document, chunk it deterministically and open an LLMRun."
      description: |
        Idempotent ingestion entry point. Computes `sha256(content)` as
        `content_hash`. If a `RawInformation` with that hash already exists,
        the existing record is returned with `outcome: "noop_existing"` and no
        new chunks or run are created (§8). Otherwise, persists `RawInformation`,
        performs chunking `v1` (§9.2), and opens an `LLMRun` with
        `idempotency_key = sha256(content_hash ∥ prompt_version ∥ model ∥ chunking_version)`.

        The newly opened run is **not** extracted automatically — the caller
        drives extraction explicitly via `runLlmExtraction` (UC-12) or by
        letting the LLM call the MCP `ingest` tools directly.

        Returns the identifiers needed by the caller (typically an LLM
        orchestrator) to drive the `ingest` MCP toolset, the REST mirrors,
        or `runLlmExtraction` against the new run.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/IngestRawInformationRequest" }
            example:
              source_type: "ata"
              content: "Ata da reunião do Projeto Apollo realizada em 2026-06-11. Participantes: João Silva e Maria Oliveira. Go-live previsto: 15/07/2026."
              metadata:
                title: "Ata Apollo 2026-06-11"
                author: "Maria Oliveira"
                document_date: "2026-06-11"
              model: "claude-opus-4-8"
              prompt_version: "v1"
      responses:
        "201":
          description: "RawInformation created; chunks persisted; LLMRun opened."
          content:
            application/json:
              schema: { $ref: "#/components/schemas/IngestRawInformationResponse" }
              example:
                outcome: "created"
                raw_information_id: "8f4a2c10-1d2e-4b3f-9a01-1234567890ab"
                content_hash: "9b2c1e0f3a4d5b6c7e8f9012345678abcdef1234567890abcdef1234567890ab"
                chunk_count: 1
                chunks:
                  - id: "1a2b3c4d-1111-2222-3333-444455556666"
                    chunk_index: 0
                    offset_start: 0
                    offset_end: 178
                llm_run_id: "c0c0c0c0-1111-2222-3333-444455556666"
                idempotency_key: "f1e2d3c4b5a6978877665544332211008899aabbccddeeff0011223344556677"
        "200":
          description: "Idempotent no-op — same content_hash already ingested (§8). Returns the existing identifiers."
          content:
            application/json:
              schema: { $ref: "#/components/schemas/IngestRawInformationResponse" }
              example:
                outcome: "noop_existing"
                raw_information_id: "8f4a2c10-1d2e-4b3f-9a01-1234567890ab"
                content_hash: "9b2c1e0f3a4d5b6c7e8f9012345678abcdef1234567890abcdef1234567890ab"
                chunk_count: 1
                chunks: []
                llm_run_id: "c0c0c0c0-1111-2222-3333-444455556666"
                idempotency_key: "f1e2d3c4b5a6978877665544332211008899aabbccddeeff0011223344556677"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
        "500": { $ref: "#/components/responses/InternalError" }

  /api/v1/ingest/raw-information/{rawInformationId}:
    parameters:
      - $ref: "#/components/parameters/RawInformationId"
    get:
      tags: ["raw-information"]
      operationId: getRawInformationById
      summary: "Fetch a single RawInformation record by id."
      description: |
        Returns the immutable raw document. If the document has been
        tombstoned by `compliance_delete` (§11), `content` is the literal
        string `"[REDACTED]"` and `metadata.compliance_deleted` is `true`
        — `content_hash` is preserved for idempotency.
      responses:
        "200":
          description: "RawInformation returned."
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RawInformation" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalError" }

  /api/v1/ingest/raw-information/{rawInformationId}/chunks:
    parameters:
      - $ref: "#/components/parameters/RawInformationId"
    get:
      tags: ["raw-chunks"]
      operationId: listRawChunksByRawInformation
      summary: "List the chunks of a RawInformation in chunk_index order."
      description: |
        Returns all `RawChunk` rows for the given `RawInformation`, ordered
        by `chunk_index` ascending. Offsets are 0-based, semi-open
        `[offset_start, offset_end)`, in Unicode code points (§9.2 / A22).
      responses:
        "200":
          description: "List of chunks."
          content:
            application/json:
              schema:
                type: object
                required: [items, total]
                properties:
                  total:
                    type: integer
                    minimum: 0
                    example: 3
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/RawChunk" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalError" }

  /api/v1/ingest/llm-runs/{llmRunId}:
    parameters:
      - $ref: "#/components/parameters/LlmRunId"
    get:
      tags: ["llm-runs"]
      operationId: getLlmRunById
      summary: "Fetch an LLMRun, including its rolling extraction summary."
      description: |
        Returns the run header (`model`, `prompt_version`, `status`,
        `attempts`, `started_at`, `finished_at`, `idempotency_key`) plus a
        per-outcome counter summary aggregated from the run's `ToolCall`
        rows (§9.1 step 6). The summary is computed at read time and never
        stored as derived state.
      responses:
        "200":
          description: "LLMRun returned."
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LlmRun" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalError" }

  /api/v1/ingest/llm-runs/{llmRunId}/tool-calls:
    parameters:
      - $ref: "#/components/parameters/LlmRunId"
      - name: limit
        in: query
        required: false
        schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
      - name: offset
        in: query
        required: false
        schema: { type: integer, minimum: 0, default: 0 }
    get:
      tags: ["llm-runs"]
      operationId: listToolCallsByLlmRun
      summary: "List the ToolCall audit trail of a run, ordered by created_at."
      description: |
        Returns the `ToolCall` rows of the run in chronological order. Each
        row records the tool name (`propose_fragment` / `propose_node` /
        `propose_link` / `propose_attribute`), its arguments, its raw
        result, and the `validation_outcome` produced by the layered
        validation of §13.
      responses:
        "200":
          description: "List of tool calls."
          content:
            application/json:
              schema:
                type: object
                required: [items, total, limit, offset]
                properties:
                  total:    { type: integer, minimum: 0, example: 12 }
                  limit:    { type: integer, minimum: 1, example: 50 }
                  offset:   { type: integer, minimum: 0, example: 0 }
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/ToolCall" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalError" }

  /api/v1/ingest/llm-runs/{llmRunId}/retry:
    parameters:
      - $ref: "#/components/parameters/LlmRunId"
    post:
      tags: ["llm-runs"]
      operationId: retryLlmRun
      summary: "Retry a failed LLMRun, reopening the same row."
      description: |
        Reopens the run in place: transitions `failed → running`, increments
        `attempts` by 1, and marks every `InformationFragment` in this run
        with `status = 'proposed'` and not consolidated as `status =
        'rejected'` (reason: retry) — §8 / §9.3. No new run row is ever
        created with the same `idempotency_key`.

        Only `failed` runs are retryable. Already-consolidated knowledge
        from the previous attempt is preserved; re-proposals fall into the
        idempotent consolidation path (§6.5).
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RetryLlmRunRequest" }
            example:
              reason: "transient LLM provider timeout"
      responses:
        "200":
          description: "Run reopened (status = running)."
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LlmRun" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: "Run is not in a retryable state (current status is not 'failed')."
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
              example:
                error:
                  code: "BUSINESS_RUN_NOT_RETRYABLE"
                  message: "LLMRun c0c0c0c0-1111-2222-3333-444455556666 is in status 'running' and cannot be retried."
                  details:
                    llm_run_id: "c0c0c0c0-1111-2222-3333-444455556666"
                    current_status: "running"
        "500": { $ref: "#/components/responses/InternalError" }

  /api/v1/ingest/llm-runs/{llmRunId}/run:
    parameters:
      - $ref: "#/components/parameters/LlmRunId"
    post:
      tags: ["llm-runs"]
      operationId: runLlmExtraction
      summary: "Trigger synchronous in-process LLM extraction over a running LLMRun (UC-12)."
      description: |
        Drives the extraction loop end-to-end: iterates the run's `RawChunk`
        rows in `chunk_index` order, opens a fresh Anthropic Messages
        conversation per chunk, runs a manual tool-use loop with the four
        `ingest` propose-* tools (derived from the same Zod schemas exposed
        by MCP — BR-24), invokes the matching in-process service function
        for each `tool_use` block (each in its own DB transaction — BR-19),
        and closes the run on completion (UC-07).

        Pre-condition: the target run's `status` must be `running` — the
        owner reopens a `failed` run via `retryLlmRun` first. The endpoint
        is **synchronous**: the HTTP connection stays open for the full
        run (LLM-bound; minutes per document is acceptable at v1 scale —
        §16). Clients MUST set a generous client-side timeout.

        On clean finish, the run transitions to `completed`. On a fatal
        Anthropic SDK error (auth, quota, non-recoverable network) mid-run,
        the orchestrator closes the run as `failed`, preserves every
        already-committed `ToolCall` / fragment / node / link / attribute,
        and returns `502 SYSTEM_LLM_PROVIDER_UNAVAILABLE` with the partial
        run summary. On any other unhandled internal exception (or ≥ 3
        consecutive `error` `validation_outcome` rows within one chunk),
        the run is closed as `failed` and the endpoint returns
        `500 SYSTEM_INTERNAL_ERROR`. The owner re-runs by invoking
        `retryLlmRun` followed by `runLlmExtraction` again.
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RunLlmExtractionRequest" }
            example: {}
      responses:
        "200":
          description: "Run completed cleanly. Body is the final LLMRun (`status = 'completed'`) including the derived summary."
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LlmRun" }
              example:
                id: "c0c0c0c0-1111-2222-3333-444455556666"
                model: "claude-opus-4-8"
                prompt_version: "v1"
                started_at: "2026-06-11T20:24:00Z"
                finished_at: "2026-06-11T20:29:42Z"
                status: "completed"
                attempts: 1
                input_raw_information_id: "8f4a2c10-1d2e-4b3f-9a01-1234567890ab"
                idempotency_key: "f1e2d3c4b5a6978877665544332211008899aabbccddeeff0011223344556677"
                summary:
                  accepted: 9
                  consolidated: 2
                  superseded_previous: 1
                  needs_review: 0
                  uncertain: 1
                  disputed: 0
                  rejected: 0
                  error: 0
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: "Run is not runnable (current status is not 'running')."
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
              example:
                error:
                  code: "BUSINESS_RUN_NOT_RUNNABLE"
                  message: "LLMRun c0c0c0c0-1111-2222-3333-444455556666 is in status 'completed' and cannot be extracted (only 'running' is runnable; reopen a failed run via retryLlmRun first)."
                  details:
                    llm_run_id: "c0c0c0c0-1111-2222-3333-444455556666"
                    current_status: "completed"
        "500": { $ref: "#/components/responses/InternalError" }
        "502": { $ref: "#/components/responses/LlmProviderUnavailable" }

  /api/v1/ingest/llm-runs/{llmRunId}/propose-fragment:
    parameters:
      - $ref: "#/components/parameters/LlmRunId"
    post:
      tags: ["ingest-propose"]
      operationId: proposeFragment
      summary: "REST mirror of MCP `propose_fragment` (UC-08)."
      description: |
        Persists an `InformationFragment` (atomic LLM-extracted claim) plus
        its `FragmentSource` rows under the target run, and records the
        corresponding `ToolCall`. Same business semantics as the MCP tool
        `propose_fragment` — only the transport differs (BR-21, BR-28).

        Run-state pre-checks: the run must exist (`404 RESOURCE_NOT_FOUND`
        otherwise) AND have `status = 'running'` (`409 BUSINESS_RUN_NOT_RUNNING`
        otherwise). Once past the pre-checks, every layered-validation
        outcome (`STRUCTURAL_INVALID`, `NOT_FOUND` for missing chunks, etc.)
        is returned **inside** the MCP envelope as `200 OK` with `ok: false`
        — consistent with the MCP transport so a single client codepath
        handles both.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ProposeFragmentInput" }
            example:
              text: "O go-live do Projeto Apollo ocorrerá em 15/07/2026."
              confidence: 0.92
              chunk_ids: ["1a2b3c4d-1111-2222-3333-444455556666"]
      responses:
        "200":
          description: |
            Service reached: the response body is the MCP envelope. Inspect
            the `ok` field — `true` for accepted / business outcomes,
            `false` for layered-validation rejections (`STRUCTURAL_INVALID`,
            `NOT_FOUND`, `INTERNAL`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ProposeMcpEnvelope" }
              examples:
                accepted:
                  summary: "Accepted fragment"
                  value:
                    ok: true
                    result:
                      fragment_id: "feedface-0000-0000-0000-000000000001"
                      status: "proposed"
                      validation_outcome: "accepted"
                rejected_structural:
                  summary: "Structural rejection (text too long)"
                  value:
                    ok: false
                    error:
                      code: "STRUCTURAL_INVALID"
                      message: "Field 'text' exceeds 1000 characters."
                      details: { field: "text", limit: 1000 }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/RunNotRunning" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
        "500": { $ref: "#/components/responses/InternalError" }

  /api/v1/ingest/llm-runs/{llmRunId}/propose-node:
    parameters:
      - $ref: "#/components/parameters/LlmRunId"
    post:
      tags: ["ingest-propose"]
      operationId: proposeNode
      summary: "REST mirror of MCP `propose_node` (UC-09)."
      description: |
        Resolves or creates a `KnowledgeNode` of the requested `node_type`,
        applying the §4 entity-resolution pipeline (exact alias match →
        trigram candidates → A12 three-way decision per BR-24): outcomes
        are `matched_existing` (reuse), `created_new` (new active node) or
        `needs_review` (new node with `status = 'needs_review'` plus one
        `EntityMatchReview` row per ambiguous candidate, fed to the
        curation `entity_match` queue). The advisory lock of BR-20
        serialises concurrent calls for the same `(node_type, norm(name))`.

        Same business semantics as the MCP tool `propose_node` — only the
        transport differs (BR-21, BR-28). Same run-state pre-checks and
        envelope semantics as `proposeFragment` above.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ProposeNodeInput" }
            example:
              node_type: "Project"
              name: "Projeto Apollo"
              aliases: ["Apollo"]
      responses:
        "200":
          description: "Service reached; inspect the MCP envelope `ok` field."
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ProposeMcpEnvelope" }
              examples:
                matched_existing:
                  summary: "Existing node reused (strong trigram match)"
                  value:
                    ok: true
                    result:
                      node_id: "aaaaaaaa-bbbb-cccc-dddd-eeeeeeeeeeee"
                      resolution: "matched_existing"
                      validation_outcome: "accepted"
                needs_review:
                  summary: "Ambiguous — new node created in needs_review"
                  value:
                    ok: true
                    result:
                      node_id: "11111111-2222-3333-4444-555555555555"
                      resolution: "needs_review"
                      validation_outcome: "needs_review"
                unknown_type:
                  summary: "Unknown node_type"
                  value:
                    ok: false
                    error:
                      code: "UNKNOWN_TYPE"
                      message: "node_type 'Animal' is not registered."
                      details: { node_type: "Animal" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/RunNotRunning" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
        "500": { $ref: "#/components/responses/InternalError" }

  /api/v1/ingest/llm-runs/{llmRunId}/propose-link:
    parameters:
      - $ref: "#/components/parameters/LlmRunId"
    post:
      tags: ["ingest-propose"]
      operationId: proposeLink
      summary: "REST mirror of MCP `propose_link` (UC-10)."
      description: |
        Persists a `KnowledgeLink` relation between two entities under the
        graph-consolidation flow of §6.5 (BR-27): vigent lookup under
        `SELECT ... FOR UPDATE`, then decide between `accepted`,
        `consolidated`, `superseded_previous`, `disputed`, or
        `accepted`-correction. Provenance to the cited fragments is always
        inserted in the same transaction (BR-18).

        Same business semantics as the MCP tool `propose_link` — only the
        transport differs (BR-21, BR-28). Same run-state pre-checks and
        envelope semantics as `proposeFragment`.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ProposeLinkInput" }
            example:
              source_node_id: "aaaaaaaa-bbbb-cccc-dddd-eeeeeeeeeeee"
              link_type: "leads"
              target_node_id: "ffffffff-0000-1111-2222-333333333333"
              confidence: 0.91
              fragment_ids: ["feedface-0000-0000-0000-000000000001"]
              valid_from: "2026-06-11"
              valid_from_basis: "document"
              change_hint: "none"
      responses:
        "200":
          description: "Service reached; inspect the MCP envelope `ok` field."
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ProposeMcpEnvelope" }
              examples:
                accepted:
                  summary: "New active link"
                  value:
                    ok: true
                    result:
                      link_id: "cccccccc-1111-2222-3333-444444444444"
                      outcome: "accepted"
                      validation_outcome: "accepted"
                consolidated:
                  summary: "Re-affirmation of an existing link"
                  value:
                    ok: true
                    result:
                      link_id: "cccccccc-1111-2222-3333-444444444444"
                      outcome: "consolidated"
                      validation_outcome: "consolidated"
                superseded:
                  summary: "Functional succession"
                  value:
                    ok: true
                    result:
                      link_id: "dddddddd-1111-2222-3333-444444444444"
                      superseded_link_id: "cccccccc-1111-2222-3333-444444444444"
                      outcome: "superseded_previous"
                      validation_outcome: "superseded_previous"
                rule_violation:
                  summary: "No vigent LinkTypeRule authorises the triple"
                  value:
                    ok: false
                    error:
                      code: "RULE_VIOLATION"
                      message: "No active LinkTypeRule authorises (Project, leads, Project)."
                      details:
                        source_node_type: "Project"
                        link_type: "leads"
                        target_node_type: "Project"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/RunNotRunning" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
        "500": { $ref: "#/components/responses/InternalError" }

  /api/v1/ingest/llm-runs/{llmRunId}/propose-attribute:
    parameters:
      - $ref: "#/components/parameters/LlmRunId"
    post:
      tags: ["ingest-propose"]
      operationId: proposeAttribute
      summary: "REST mirror of MCP `propose_attribute` (UC-11)."
      description: |
        Persists a `NodeAttribute` literal value on a node under the
        graph-consolidation flow of §6.5 (BR-27). Mirror of `proposeLink`
        scoped by `(node_id, attribute_key_id)` instead of
        `(source_node_id, link_type_id, target_node_id)`. Same outcomes
        (`accepted` / `consolidated` / `superseded_previous` / `disputed` /
        `accepted`-correction) and same provenance invariant (BR-18).

        Same business semantics as the MCP tool `propose_attribute` — only
        the transport differs (BR-21, BR-28). Same run-state pre-checks
        and envelope semantics as `proposeFragment`.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ProposeAttributeInput" }
            example:
              node_id: "aaaaaaaa-bbbb-cccc-dddd-eeeeeeeeeeee"
              key: "go_live_date"
              value: "2026-07-15"
              confidence: 0.92
              fragment_ids: ["feedface-0000-0000-0000-000000000001"]
              valid_from: "2026-06-11"
              valid_from_basis: "document"
              change_hint: "none"
      responses:
        "200":
          description: "Service reached; inspect the MCP envelope `ok` field."
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ProposeMcpEnvelope" }
              examples:
                accepted:
                  summary: "New active attribute"
                  value:
                    ok: true
                    result:
                      attribute_id: "eeeeeeee-1111-2222-3333-444444444444"
                      outcome: "accepted"
                      validation_outcome: "accepted"
                value_type_mismatch:
                  summary: "Value does not parse as the key's value_type"
                  value:
                    ok: false
                    error:
                      code: "STRUCTURAL_INVALID"
                      message: "value 'tomorrow' does not parse as date."
                      details: { key: "go_live_date", value_type: "date" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/RunNotRunning" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
        "500": { $ref: "#/components/responses/InternalError" }

components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: "JWT"
      description: "Neon Auth (Stack Auth) JWT validated in BFF middleware (§2.5, A29)."

  parameters:
    RawInformationId:
      name: rawInformationId
      in: path
      required: true
      schema: { type: string, format: uuid }
      example: "8f4a2c10-1d2e-4b3f-9a01-1234567890ab"
      description: "UUID of the `RawInformation` row."
    LlmRunId:
      name: llmRunId
      in: path
      required: true
      schema: { type: string, format: uuid }
      example: "c0c0c0c0-1111-2222-3333-444455556666"
      description: "UUID of the `LLMRun` row."

  responses:
    Unauthorized:
      description: "Missing, expired or invalid JWT (§2.5, A29). Request rejected at middleware before any DB access (cf. acceptance C16)."
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
          example:
            error:
              code: "AUTH_UNAUTHORIZED"
              message: "Authentication required."
              details: {}
    NotFound:
      description: "The referenced entity does not exist."
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
          example:
            error:
              code: "RESOURCE_NOT_FOUND"
              message: "RawInformation 8f4a2c10-1d2e-4b3f-9a01-1234567890ab not found."
              details:
                entity: "raw_information"
                id: "8f4a2c10-1d2e-4b3f-9a01-1234567890ab"
    UnprocessableEntity:
      description: "Request body failed Zod validation (§13 structural layer)."
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
          example:
            error:
              code: "VALIDATION_REQUIRED_FIELD"
              message: "Field 'content' is required."
              details:
                field: "content"
    RunNotRunning:
      description: |
        REST propose-* mirror called against a run whose `status != 'running'`
        (UC-08..UC-11 alt 1a, REST branch — BR-21). The MCP transport
        collapses this case into a `STRUCTURAL_INVALID` envelope; the REST
        mirror surfaces it as a 409 because human callers benefit from the
        explicit status code.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
          example:
            error:
              code: "BUSINESS_RUN_NOT_RUNNING"
              message: "LLMRun c0c0c0c0-1111-2222-3333-444455556666 is in status 'completed'; propose-* is only available while the run is 'running'."
              details:
                llm_run_id: "c0c0c0c0-1111-2222-3333-444455556666"
                current_status: "completed"
    LlmProviderUnavailable:
      description: |
        The Anthropic SDK raised a non-recoverable error (auth, quota,
        persistent network failure) during a `runLlmExtraction` call
        (UC-12 alt 4a, BR-26 fatal path). The orchestrator closed the run
        as `failed`, preserved every already-committed `ToolCall` /
        fragment / node / link / attribute, and returns the partial run
        summary in the body. The owner re-runs by invoking `retryLlmRun`
        followed by `runLlmExtraction` again.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
          example:
            error:
              code: "SYSTEM_LLM_PROVIDER_UNAVAILABLE"
              message: "Anthropic provider unreachable during extraction; run closed as failed."
              details:
                llm_run_id: "c0c0c0c0-1111-2222-3333-444455556666"
                status: "failed"
                attempts: 1
                partial_summary:
                  accepted: 3
                  consolidated: 0
                  superseded_previous: 0
                  needs_review: 0
                  uncertain: 0
                  disputed: 0
                  rejected: 0
                  error: 0
    InternalError:
      description: "Unexpected internal error."
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
          example:
            error:
              code: "SYSTEM_INTERNAL_ERROR"
              message: "Unexpected internal error."
              details: {}

  schemas:

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              example: "RESOURCE_NOT_FOUND"
            message:
              type: string
              example: "RawInformation 8f4a2c10-1d2e-4b3f-9a01-1234567890ab not found."
            details:
              type: object
              additionalProperties: true
              example:
                entity: "raw_information"

    SourceType:
      type: string
      enum: [pdf, email, ata, chat, artigo, transcricao, outro]
      example: "ata"
      description: "Enum mirrored from PostgreSQL type `source_type` (§3.1)."

    LlmRunStatus:
      type: string
      enum: [running, completed, failed]
      example: "completed"
      description: "Enum mirrored from PostgreSQL type `llm_run_status` (§3.5)."

    ValidationOutcome:
      type: string
      enum: [accepted, consolidated, superseded_previous, needs_review, uncertain, disputed, rejected, error]
      example: "consolidated"
      description: "Enum mirrored from PostgreSQL type `validation_outcome` (§3.5). Business rejection is `rejected` — not an HTTP error."

    ValidFromBasis:
      type: string
      enum: [stated, document]
      description: |
        Caller-supplied date justification (§6.5, A14). `stated` requires the
        value to appear textually in one of the cited fragments; `document`
        requires `metadata.document_date` on the source `RawInformation`.

        Note: there is a third internal basis, `received` (the BFF fallback
        to `RawInformation.received_at`), but it is never accepted from API
        callers — the temporal validator applies it server-side when neither
        `stated` nor `document` can justify the date and the type allows the
        fallback. Read responses that surface the resolved basis (e.g.
        `valid_from_source` in the knowledge-graph domain) may therefore
        return `received`; this input enum does not.
      example: "document"

    ChangeHint:
      type: string
      enum: [none, succession, correction]
      description: |
        Caller-supplied hint that disambiguates re-affirmation from change
        or errata in §6.5. The graph-consolidation service still requires
        textual signals in the cited fragments to act on `succession` /
        `correction` (BR-25).
      example: "none"

    IngestRawInformationRequest:
      type: object
      required: [source_type, content, model, prompt_version]
      properties:
        source_type: { $ref: "#/components/schemas/SourceType" }
        content:
          type: string
          minLength: 1
          maxLength: 10485760
          description: "Original document content, inline. Max 10 MiB (A5)."
          example: "Ata da reunião do Projeto Apollo realizada em 2026-06-11..."
        storage_ref:
          type: string
          nullable: true
          description: "Reserved for future externalization; must be null in this version (A5)."
          example: null
        metadata:
          type: object
          additionalProperties: true
          description: "Free-form bag. The reserved key `document_date` (ISO date) participates in the date-justification chain (§6.5 / A14)."
          example:
            title: "Ata Apollo 2026-06-11"
            author: "Maria Oliveira"
            document_date: "2026-06-11"
        model:
          type: string
          minLength: 1
          description: "LLM model identifier that will run the extraction. Part of the run idempotency key (A18)."
          example: "claude-opus-4-8"
        prompt_version:
          type: string
          minLength: 1
          description: "Versioned extraction prompt identifier. Part of the run idempotency key (A18). Bumping it forces a new LLMRun on the same content (§8)."
          example: "v1"

    IngestOutcome:
      type: string
      enum: [created, noop_existing]
      description: |
        - `created`: new `RawInformation`, new chunks, new `LLMRun` were persisted (HTTP 201).
        - `noop_existing`: the `content_hash` already exists; the existing identifiers are returned (HTTP 200, idempotent — §8).
      example: "created"

    ChunkRef:
      type: object
      required: [id, chunk_index, offset_start, offset_end]
      properties:
        id: { type: string, format: uuid, example: "1a2b3c4d-1111-2222-3333-444455556666" }
        chunk_index: { type: integer, minimum: 0, example: 0 }
        offset_start: { type: integer, minimum: 0, example: 0 }
        offset_end: { type: integer, minimum: 1, example: 178 }

    IngestRawInformationResponse:
      type: object
      required: [outcome, raw_information_id, content_hash, chunk_count, chunks, llm_run_id, idempotency_key]
      properties:
        outcome: { $ref: "#/components/schemas/IngestOutcome" }
        raw_information_id: { type: string, format: uuid, example: "8f4a2c10-1d2e-4b3f-9a01-1234567890ab" }
        content_hash:
          type: string
          pattern: "^[0-9a-f]{64}$"
          description: "sha-256 of `content`, hex-encoded. Base of ingestion idempotency (§8)."
          example: "9b2c1e0f3a4d5b6c7e8f9012345678abcdef1234567890abcdef1234567890ab"
        chunk_count:
          type: integer
          minimum: 1
          description: "Total number of chunks persisted for this RawInformation."
          example: 1
        chunks:
          type: array
          description: |
            On `outcome = "created"`: the list of newly persisted chunks. On
            `outcome = "noop_existing"`: an empty array — to inspect the
            existing chunks, call `listRawChunksByRawInformation`.
          items: { $ref: "#/components/schemas/ChunkRef" }
        llm_run_id:
          type: string
          format: uuid
          description: "Identifier of the `LLMRun` opened (or returned) for this ingestion."
          example: "c0c0c0c0-1111-2222-3333-444455556666"
        idempotency_key:
          type: string
          pattern: "^[0-9a-f]{64}$"
          description: "sha-256 over content_hash ∥ prompt_version ∥ model ∥ chunking_version (A18)."
          example: "f1e2d3c4b5a6978877665544332211008899aabbccddeeff0011223344556677"

    RawInformation:
      type: object
      required: [id, source_type, content, content_hash, received_at, metadata]
      properties:
        id: { type: string, format: uuid, example: "8f4a2c10-1d2e-4b3f-9a01-1234567890ab" }
        source_type: { $ref: "#/components/schemas/SourceType" }
        content:
          type: string
          description: |
            Original content, immutable. When the row has been tombstoned by
            `compliance_delete` (§11), this field is the literal string
            `"[REDACTED]"` and `metadata.compliance_deleted` is `true`.
          example: "Ata da reunião do Projeto Apollo realizada em 2026-06-11..."
        storage_ref:
          type: string
          nullable: true
          example: null
        content_hash:
          type: string
          pattern: "^[0-9a-f]{64}$"
          example: "9b2c1e0f3a4d5b6c7e8f9012345678abcdef1234567890abcdef1234567890ab"
        received_at:
          type: string
          format: date-time
          example: "2026-06-11T20:24:00Z"
        metadata:
          type: object
          additionalProperties: true
          example:
            title: "Ata Apollo 2026-06-11"
            author: "Maria Oliveira"
            document_date: "2026-06-11"

    RawChunk:
      type: object
      required: [id, raw_information_id, chunk_index, text, offset_start, offset_end, chunking_version]
      properties:
        id: { type: string, format: uuid, example: "1a2b3c4d-1111-2222-3333-444455556666" }
        raw_information_id: { type: string, format: uuid, example: "8f4a2c10-1d2e-4b3f-9a01-1234567890ab" }
        chunk_index:
          type: integer
          minimum: 0
          description: "0-based position of the chunk within its RawInformation."
          example: 0
        text:
          type: string
          description: "Verbatim slice of `content` between `offset_start` and `offset_end`."
          example: "Ata da reunião do Projeto Apollo realizada em 2026-06-11..."
        offset_start:
          type: integer
          minimum: 0
          description: "Start offset in `content`, 0-based, in Unicode code points (§9.2, A22)."
          example: 0
        offset_end:
          type: integer
          minimum: 1
          description: "End offset in `content`, exclusive, in Unicode code points (§9.2, A22)."
          example: 178
        locator:
          type: object
          nullable: true
          description: "Readable anchor for citation; shape depends on `source_type` (A23)."
          properties:
            page:    { type: integer, nullable: true, example: 1 }
            line:    { type: integer, nullable: true, example: null }
            speaker: { type: string,  nullable: true, example: null }
            ts:      { type: string,  nullable: true, example: null }
        chunking_version:
          type: string
          description: "Identifier of the chunking strategy. Currently always `v1` (§9.2)."
          example: "v1"

    LlmRunSummary:
      type: object
      description: |
        Run metrics. The 8 outcome counters are aggregated from this run's
        `ToolCall` rows (§9.1 step 6); `orphaned_fragments` is a fragment-level
        recall signal. Computed at read time; never persisted.
      required: [accepted, consolidated, superseded_previous, needs_review, uncertain, disputed, rejected, error, orphaned_fragments]
      properties:
        accepted:             { type: integer, minimum: 0, example: 5 }
        consolidated:         { type: integer, minimum: 0, example: 2 }
        superseded_previous:  { type: integer, minimum: 0, example: 1 }
        needs_review:         { type: integer, minimum: 0, example: 0 }
        uncertain:            { type: integer, minimum: 0, example: 0 }
        disputed:             { type: integer, minimum: 0, example: 0 }
        rejected:             { type: integer, minimum: 0, example: 0 }
        error:                { type: integer, minimum: 0, example: 0 }
        orphaned_fragments:
          type: integer
          minimum: 0
          example: 0
          description: |
            Fragments proposed by this run with NO provenance row — extracted
            but never cited in a consolidated link/attribute. They stay
            `proposed`, are excluded from the partial FTS index
            (`WHERE status='accepted'`) and are therefore unsearchable: a silent
            recall gap. Same definition as the retry orphan-cleanup. Conclusive
            only once the run reaches a terminal status.

    LlmRun:
      type: object
      required: [id, model, prompt_version, started_at, status, attempts, input_raw_information_id, idempotency_key, summary]
      properties:
        id: { type: string, format: uuid, example: "c0c0c0c0-1111-2222-3333-444455556666" }
        model:
          type: string
          description: "LLM model identifier."
          example: "claude-opus-4-8"
        prompt_version:
          type: string
          example: "v1"
        started_at:
          type: string
          format: date-time
          example: "2026-06-11T20:24:00Z"
        finished_at:
          type: string
          format: date-time
          nullable: true
          description: "Set when `status` leaves `running`. Always null while `status = 'running'` (DB CHECK)."
          example: "2026-06-11T20:24:15Z"
        status: { $ref: "#/components/schemas/LlmRunStatus" }
        attempts:
          type: integer
          minimum: 1
          description: "1 on first run; incremented by 1 on each retry (§8)."
          example: 1
        input_raw_information_id: { type: string, format: uuid, example: "8f4a2c10-1d2e-4b3f-9a01-1234567890ab" }
        idempotency_key:
          type: string
          pattern: "^[0-9a-f]{64}$"
          example: "f1e2d3c4b5a6978877665544332211008899aabbccddeeff0011223344556677"
        summary: { $ref: "#/components/schemas/LlmRunSummary" }

    ToolCall:
      type: object
      required: [id, llm_run_id, tool_name, arguments, validation_outcome, created_at]
      properties:
        id: { type: string, format: uuid, example: "deadbeef-aaaa-bbbb-cccc-1234567890ab" }
        llm_run_id: { type: string, format: uuid, example: "c0c0c0c0-1111-2222-3333-444455556666" }
        tool_name:
          type: string
          enum: [propose_fragment, propose_node, propose_link, propose_attribute]
          description: "Ingest toolset member that produced this call (§14.1)."
          example: "propose_fragment"
        arguments:
          type: object
          additionalProperties: true
          description: "Verbatim JSON arguments passed to the MCP tool (or REST mirror)."
          example:
            text: "O go-live do Projeto Apollo ocorrerá em 15/07/2026."
            confidence: 0.92
            chunk_ids: ["1a2b3c4d-1111-2222-3333-444455556666"]
        result:
          type: object
          additionalProperties: true
          nullable: true
          description: "Verbatim JSON result returned to the LLM (the MCP envelope's `result` or `error`)."
          example:
            fragment_id: "feedface-0000-0000-0000-000000000001"
            status: "proposed"
        validation_outcome: { $ref: "#/components/schemas/ValidationOutcome" }
        created_at:
          type: string
          format: date-time
          example: "2026-06-11T20:24:05Z"

    RetryLlmRunRequest:
      type: object
      properties:
        reason:
          type: string
          maxLength: 500
          description: "Optional human-readable note describing why the retry was requested."
          example: "transient LLM provider timeout"

    RunLlmExtractionRequest:
      type: object
      description: |
        Empty body in v1.0.0 — the orchestrator reads `model` and
        `prompt_version` from the target `LLMRun` row (declared at intake
        via UC-01 and participating in `idempotency_key` per BR-08). The
        body is reserved for future per-chunk overrides.
      additionalProperties: false
      properties: {}

    ProposeMcpEnvelope:
      type: object
      description: |
        Common envelope returned by every propose-* REST mirror, matching
        the MCP envelope verbatim. Inspect `ok`: when `true`, `result`
        holds the business outcome; when `false`, `error` holds the
        layered-validation rejection code (`STRUCTURAL_INVALID`,
        `UNKNOWN_TYPE`, `RULE_VIOLATION`, `TEMPORAL_INCOHERENT`,
        `DATE_UNJUSTIFIED`, `NOT_FOUND`, `INTERNAL`).
      required: [ok]
      properties:
        ok:
          type: boolean
          example: true
        result:
          type: object
          additionalProperties: true
          description: "Present iff `ok: true`. Shape depends on the operation — see the per-endpoint examples."
        error:
          type: object
          description: "Present iff `ok: false`."
          required: [code, message]
          properties:
            code:
              type: string
              enum: [STRUCTURAL_INVALID, UNKNOWN_TYPE, RULE_VIOLATION, TEMPORAL_INCOHERENT, DATE_UNJUSTIFIED, NOT_FOUND, INTERNAL]
              example: "STRUCTURAL_INVALID"
            message:
              type: string
              example: "Field 'text' exceeds 1000 characters."
            details:
              type: object
              additionalProperties: true

    ProposeFragmentInput:
      type: object
      required: [text, confidence, chunk_ids]
      properties:
        text:
          type: string
          minLength: 1
          maxLength: 1000
          description: "Atomic claim text. Hard-bounded to 1000 chars (BR-22 / DB CHECK)."
          example: "O go-live do Projeto Apollo ocorrerá em 15/07/2026."
        confidence:
          type: number
          minimum: 0
          maximum: 1
          description: "LLM's self-assessed confidence in the claim. Routed per BR-17."
          example: 0.92
        chunk_ids:
          type: array
          minItems: 1
          description: "RawChunk ids supporting the claim. Every chunk MUST belong to the run's `input_raw_information_id`."
          items: { type: string, format: uuid }
          example: ["1a2b3c4d-1111-2222-3333-444455556666"]

    ProposeNodeInput:
      type: object
      required: [node_type, name]
      properties:
        node_type:
          type: string
          minLength: 1
          maxLength: 64
          description: "Seeded NodeType name (e.g., `Person`, `Organization`, `Project`...). Catalog miss → `UNKNOWN_TYPE`."
          example: "Project"
        name:
          type: string
          minLength: 1
          maxLength: 500
          description: "Canonical entity name. Normalized via `norm()` for resolution (BR-24)."
          example: "Projeto Apollo"
        aliases:
          type: array
          description: "Optional list of additional surface forms; each becomes a `NodeAlias` row (idempotent via UNIQUE `(node_id, alias_norm)`)."
          items:
            type: string
            minLength: 1
            maxLength: 500
          example: ["Apollo"]

    ProposeLinkInput:
      type: object
      required: [source_node_id, link_type, target_node_id, confidence, fragment_ids]
      properties:
        source_node_id: { type: string, format: uuid }
        link_type:
          type: string
          minLength: 1
          maxLength: 64
          description: "Seeded LinkType name. Catalog miss → `UNKNOWN_TYPE`; rule miss → `RULE_VIOLATION`."
          example: "leads"
        target_node_id: { type: string, format: uuid }
        confidence:
          type: number
          minimum: 0
          maximum: 1
          example: 0.91
        fragment_ids:
          type: array
          minItems: 1
          description: "Cited `InformationFragment` ids; each must belong to this run (BR-18 anti-hallucination)."
          items: { type: string, format: uuid }
        valid_from:
          type: string
          format: date
          nullable: true
          description: "Required when `link_type.requires_valid_from = true`. Justification per `valid_from_basis` (BR-16)."
        valid_from_basis:
          $ref: "#/components/schemas/ValidFromBasis"
        valid_to:
          type: string
          format: date
          nullable: true
          description: "Semi-open upper bound `[valid_from, valid_to)`. Must be strictly greater than `valid_from` when both are present."
        change_hint:
          $ref: "#/components/schemas/ChangeHint"

    ProposeAttributeInput:
      type: object
      required: [node_id, key, value, confidence, fragment_ids]
      properties:
        node_id: { type: string, format: uuid }
        key:
          type: string
          minLength: 1
          maxLength: 64
          description: "Seeded AttributeKey `key`. Catalog miss → `UNKNOWN_TYPE`; node_type mismatch → `STRUCTURAL_INVALID`."
          example: "go_live_date"
        value:
          description: "Literal value; MUST parse as the key's declared `value_type` (date / number / text / bool)."
          oneOf:
            - { type: string, example: "2026-07-15" }
            - { type: number }
            - { type: boolean }
