openapi: "3.0.3"
info:
  title: "Remember — Consolidated API"
  version: "1.0.0"
  description: |
    Consolidated REST surface of the BFF. One entry per domain, aggregated
    via `$ref` from each domain's `openapi.yaml`. The MCP toolsets (§14 of
    `remember-modelagem-v7.md`) are NOT mirrored here — REST and MCP
    share the same service layer but only REST has an OpenAPI contract.

servers:
  - url: "http://localhost:3000"
    description: "Local development BFF"

paths:

  # ---------------------------------------------------------------------------
  # Ingestion domain (docs/specs/domains/ingestion/openapi.yaml)
  # ---------------------------------------------------------------------------
  /api/v1/ingest/raw-information:
    $ref: "./domains/ingestion/openapi.yaml#/paths/~1api~1v1~1ingest~1raw-information"
  /api/v1/ingest/raw-information/{rawInformationId}:
    $ref: "./domains/ingestion/openapi.yaml#/paths/~1api~1v1~1ingest~1raw-information~1{rawInformationId}"
  /api/v1/ingest/raw-information/{rawInformationId}/chunks:
    $ref: "./domains/ingestion/openapi.yaml#/paths/~1api~1v1~1ingest~1raw-information~1{rawInformationId}~1chunks"
  /api/v1/ingest/llm-runs/{llmRunId}:
    $ref: "./domains/ingestion/openapi.yaml#/paths/~1api~1v1~1ingest~1llm-runs~1{llmRunId}"
  /api/v1/ingest/llm-runs/{llmRunId}/tool-calls:
    $ref: "./domains/ingestion/openapi.yaml#/paths/~1api~1v1~1ingest~1llm-runs~1{llmRunId}~1tool-calls"
  /api/v1/ingest/llm-runs/{llmRunId}/retry:
    $ref: "./domains/ingestion/openapi.yaml#/paths/~1api~1v1~1ingest~1llm-runs~1{llmRunId}~1retry"

  # ---------------------------------------------------------------------------
  # Knowledge Graph domain (docs/specs/domains/knowledge-graph/openapi.yaml)
  # ---------------------------------------------------------------------------
  /api/v1/node-types:
    $ref: "./domains/knowledge-graph/openapi.yaml#/paths/~1api~1v1~1node-types"
  /api/v1/link-types:
    $ref: "./domains/knowledge-graph/openapi.yaml#/paths/~1api~1v1~1link-types"
  /api/v1/attribute-keys:
    $ref: "./domains/knowledge-graph/openapi.yaml#/paths/~1api~1v1~1attribute-keys"
  /api/v1/nodes:
    $ref: "./domains/knowledge-graph/openapi.yaml#/paths/~1api~1v1~1nodes"
  /api/v1/nodes/{node_id}:
    $ref: "./domains/knowledge-graph/openapi.yaml#/paths/~1api~1v1~1nodes~1{node_id}"
  /api/v1/nodes/{node_id}/traverse:
    $ref: "./domains/knowledge-graph/openapi.yaml#/paths/~1api~1v1~1nodes~1{node_id}~1traverse"
  /api/v1/nodes/{node_id}/attributes/{key}/history:
    $ref: "./domains/knowledge-graph/openapi.yaml#/paths/~1api~1v1~1nodes~1{node_id}~1attributes~1{key}~1history"
  /api/v1/links/{link_id}:
    $ref: "./domains/knowledge-graph/openapi.yaml#/paths/~1api~1v1~1links~1{link_id}"
  /api/v1/links/{link_id}/history:
    $ref: "./domains/knowledge-graph/openapi.yaml#/paths/~1api~1v1~1links~1{link_id}~1history"
  /api/v1/attributes/{attribute_id}:
    $ref: "./domains/knowledge-graph/openapi.yaml#/paths/~1api~1v1~1attributes~1{attribute_id}"
  /api/v1/attributes/{attribute_id}/history:
    $ref: "./domains/knowledge-graph/openapi.yaml#/paths/~1api~1v1~1attributes~1{attribute_id}~1history"

  # ---------------------------------------------------------------------------
  # Query / Retrieval domain (docs/specs/domains/query-retrieval/openapi.yaml)
  # ---------------------------------------------------------------------------
  /api/v1/search:
    $ref: "./domains/query-retrieval/openapi.yaml#/paths/~1api~1v1~1search"
  /api/v1/provenance/links/{link_id}:
    $ref: "./domains/query-retrieval/openapi.yaml#/paths/~1api~1v1~1provenance~1links~1{link_id}"
  /api/v1/provenance/attributes/{attribute_id}:
    $ref: "./domains/query-retrieval/openapi.yaml#/paths/~1api~1v1~1provenance~1attributes~1{attribute_id}"
  /api/v1/provenance/fragments/{fragment_id}:
    $ref: "./domains/query-retrieval/openapi.yaml#/paths/~1api~1v1~1provenance~1fragments~1{fragment_id}"

  # ---------------------------------------------------------------------------
  # Compliance & Audit domain (docs/specs/domains/compliance-audit/openapi.yaml)
  # ---------------------------------------------------------------------------
  /api/v1/compliance/deletions:
    $ref: "./domains/compliance-audit/openapi.yaml#/paths/~1api~1v1~1compliance~1deletions"
  /api/v1/compliance/deletions/{complianceDeletionId}:
    $ref: "./domains/compliance-audit/openapi.yaml#/paths/~1api~1v1~1compliance~1deletions~1{complianceDeletionId}"
  /api/v1/audit/curation-actions:
    $ref: "./domains/compliance-audit/openapi.yaml#/paths/~1api~1v1~1audit~1curation-actions"
  /api/v1/audit/curation-actions/{curationActionId}:
    $ref: "./domains/compliance-audit/openapi.yaml#/paths/~1api~1v1~1audit~1curation-actions~1{curationActionId}"

  # ---------------------------------------------------------------------------
  # Curation domain (docs/specs/domains/curation/openapi.yaml)
  # ---------------------------------------------------------------------------
  # Curator writes only. `compliance_delete` execution and `CurationAction`
  # reads are owned by the `compliance-audit` domain above.
  /api/v1/curation/queue:
    $ref: "./domains/curation/openapi.yaml#/paths/~1api~1v1~1curation~1queue"
  /api/v1/curation/entity-matches/{node_id}/resolve:
    $ref: "./domains/curation/openapi.yaml#/paths/~1api~1v1~1curation~1entity-matches~1{node_id}~1resolve"
  /api/v1/curation/nodes/merge:
    $ref: "./domains/curation/openapi.yaml#/paths/~1api~1v1~1curation~1nodes~1merge"
  /api/v1/curation/disputes/resolve:
    $ref: "./domains/curation/openapi.yaml#/paths/~1api~1v1~1curation~1disputes~1resolve"
  /api/v1/curation/items/confirm:
    $ref: "./domains/curation/openapi.yaml#/paths/~1api~1v1~1curation~1items~1confirm"
  /api/v1/curation/items/reject:
    $ref: "./domains/curation/openapi.yaml#/paths/~1api~1v1~1curation~1items~1reject"
  /api/v1/curation/items/correct:
    $ref: "./domains/curation/openapi.yaml#/paths/~1api~1v1~1curation~1items~1correct"
