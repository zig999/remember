# =============================================================================
# Compliance scan notes — v2.9.0 re-scan (render-graph-after-ingest wave)
# =============================================================================
#
# Scope of this re-scan: chat domain v2.9.0. Core change: `graph_delta` SSE
# frame projection now also covers `ingest_directed` (BR-43 v2.6 step 9 /
# back-spec BR-41). The `source_tool` enum in `GraphDeltaEvent` gains a fifth
# literal: `"ingest_directed"`. A new SSE example `graphDeltaIngestDirected`
# is added. Frontend feature spec gains UC-CG-14 and UI-12 trigger widening.
# No new REST endpoints, no new schema fields, no migration.
#
# LGPD rules evaluated and PASSED (no new blocking or CR-requiring gaps):
#
# 1. missing_data_retention_policy
#    PASS — No new PII-named fields introduced by v2.9.0. The `GraphNodeWire`
#    schema (including canonical_name) has been present since v2.1 and was
#    evaluated as PASS in CMP-20260622-205100 (canonical_name is an
#    entity-identity field, not a personal-data column; the detection rule
#    applies to exact name-pattern matches). The new `source_tool` enum entry
#    `"ingest_directed"` is a functional discriminator, not a PII field. No
#    new retention-period BR is structurally required.
#
# 2. missing_consent_mechanism
#    PASS — Single-owner system (v7 §2.3 / ADR A20); no User entity; no
#    multi-tenant personal data collection. UC-CG-14 (new in v1.5.0 of the
#    feature spec) describes graph visualization of entities created by
#    ingest_directed — the data subject is the owner and the data was
#    already persisted via the ingestion pipeline with its own consent
#    model. No new consent BR is required.
#
# 3. missing_audit_log
#    PASS — ingest_directed creates/modifies KnowledgeNode/KnowledgeLink/
#    InformationFragment records. Audit is structurally documented in:
#    (a) BR-43 v2.6 step 6: chat_tool_call row (BR-32) with full arguments
#    and per-item result jsonb; (b) the ingestion pipeline's LLMRun record
#    (ingestion.back.md BR-03) created during the directed-ingestion intake.
#    The graph_delta SSE frame itself is NOT persisted (BR-43 v2.6 step 9
#    explicitly states: "The frame is NOT persisted (BR-32 owns audit)") —
#    it is an observational projection of data already committed and audited.
#    No new audit-log gap introduced by v2.9.0.
#
# 4. pii_field_undeclared
#    PASS — No new OpenAPI schema field introduced by v2.9.0 matches the
#    PII name-pattern list (email, name, phone, cpf, address, birth_date,
#    ip_address). The `source_tool` enum extension is not a data field.
#    The `graphDeltaIngestDirected` example uses canonical_name values
#    "Alinhamento Apollo" (event name) and "Apollo" (project name) — these
#    are organisational entity names, not personal names. No new pii_field
#    gap introduced.
#
# 5. missing_right_to_erasure
#    PASS — Data persisted by ingest_directed (RawInformation, KnowledgeNode,
#    KnowledgeLink) is subject to the v7 §11 compliance_delete flow owned by
#    the compliance-audit domain (UC-01). The graph_delta frame is ephemeral
#    (not stored). No new erasure gap introduced by v2.9.0.
#
# 6. missing_data_minimization
#    PASS — The graph_delta payload projected from ingest_directed carries:
#    source_tool (discriminator), nodes[] (id, node_type, canonical_name,
#    status), links[] (id, source_node_id, target_node_id, link_type,
#    is_temporal, optional link_type_label). All fields serve the documented
#    purpose of graph visualization (UC-CG-14). No excess data fields detected.
#
# 7. hardcoded_pii_in_spec_example
#    CARRIED FORWARD (CFND-001) — "Rodrigo" remains in pre-existing SSE stream
#    examples (graph_delta canonical_name, text_delta content) and in the
#    GraphNodeWire canonical_name example value in openapi.yaml. This was first
#    flagged in CMP-20260622-205100 and has not been remediated.
#    NEW v2.9.0 EXAMPLE EVALUATED: the new graphDeltaIngestDirected example
#    uses "Alinhamento Apollo" and "Apollo" as canonical_name values — these
#    are an event name and a project name respectively, not real-looking
#    personal names. No new PII introduced by the v2.9.0 additions.
#
# Single-owner model note (v7 §2.3 / ADR A20):
#    The chat domain carries NO user_id column on any table. Authentication is
#    a network-access gate; the Owner is the sole data subject and the sole
#    operator. LGPD obligations relating to third-party data subjects do not
#    arise in this context. The v2.9.0 render-graph-after-ingest feature
#    dispatches through the audited ingestion pipeline (5-layer validation +
#    anti-hallucination per ingestion.back.md BR-26); the LLM never writes
#    raw SQL (v7 §2 inviolable). No new LGPD compliance gaps are introduced
#    by the graph_delta-for-ingest_directed capability.
