# =============================================================================
# Compliance scan notes — P2.1 error-code taxonomy wave (all backend domains)
# =============================================================================
#
# SCOPE NOTE
#
# This scan covers the six backend domains updated in the P2.1 wave (error-code
# taxonomy unification): ingestion (v1.5.0 / back v1.6.1), compliance-audit
# (v1.2.0 / back v1.4.0), knowledge-graph (v1.6.0 / back v1.5.0), curation
# (v1.2.0 / back v1.4.0), query-retrieval (v1.2.0 / back v1.2.0), chat (v2.6.0
# / back v2.6.0). The global error-codes.md was updated to declare the canonical
# namespaced taxonomy (P2.1 landing artifact). No new PII-collecting endpoints,
# no new personal-data fields, and no new audit-trail gaps were introduced by P2.1
# itself — the findings below are structural gaps that pre-date P2.1 and were
# surfaced for the first time on this pass.
#
# ── SINGLE-OWNER MODEL NOTE ──
#
# The system is single-owner by specification (v7 §2.3, A20 — "Projeto pessoal,
# single-owner por especificação"). The operator is the data owner and also the
# primary data subject for data that belongs to the operator. LGPD obligations
# for third-party data-subject rights (consent, erasure requests FROM the data
# subject, etc.) are structurally declared as out of scope by the normative source.
# The compliance_delete operation (compliance-audit UC-01) IS the controlled
# erasure mechanism mandated by §11 of the normative source for LGPD Art.18(VI).
# Rules that presuppose a multi-subject model (missing_consent_mechanism,
# missing_right_to_erasure as user-account-deletion UC) are evaluated but do not
# produce findings because the spec structurally excludes those scenarios — there
# is no User entity and no multi-subject ingestion path.
#
# ── RULE: missing_data_retention_policy ──
#
# PASS — The spec does not declare a time-based retention period for any field.
# However, §11 of the normative source mandates the compliance_delete erasure
# mechanism for every personal-data field (content, original_input, derived
# fragments and graph links/attributes). The absence of a time-based auto-expiry
# policy is a single-owner design decision (the operator self-manages retention
# via compliance_delete on demand); no structural BR declaring a retention window
# is required by the spec. No finding raised on this rule for this domain set.
#
# ── RULE: missing_consent_mechanism ──
#
# PASS — The single-owner model (§2.3, A20) means the operator is both data
# controller and primary data subject; no consent-registration BR is required.
# Third-party personal data (e.g., names of persons mentioned in ingested
# documents) is processed under the legitimate-interest basis for a personal
# knowledge repository. No UC collects personal data FROM an external data subject.
# No finding raised.
#
# ── RULE: missing_audit_log ──
#
# PASS — Every endpoint that creates, modifies, or deletes sensitive data has a
# corresponding audit-trail BR:
#   - ingestion propose-* operations → ToolCall rows (BR-23, ingestion.back.md).
#   - curation operations (resolve_entity_match, merge_nodes, resolve_dispute,
#     confirm_item, reject_item, correct_item) → CurationAction rows (compliance-
#     audit domain, BR-08).
#   - compliance_delete → ComplianceDeletion + CurationAction rows (compliance-
#     audit UC-01, BR-02, BR-08).
# No endpoint creating, modifying, or deleting sensitive data lacks an audit BR.
#
# ── RULE: pii_field_undeclared ──
#
# FINDING CFND-004 — ingestion/openapi.yaml ProposeNodeInput.name
# The field name is exactly "name" (matches PII name pattern per detection
# taxonomy). The field stores human-entered entity names, which for node_type =
# "Person" are personal data (person names). No data classification section
# exists in the ingestion spec artifacts. Required action: create_spec_cr to add
# a data classification note to ingestion.spec.md or ingestion.back.md.
#
# NOT FLAGGED — knowledge-graph/openapi.yaml NodeType.name / LinkType.name
# These fields store system-catalog type names (e.g., "Project", "participates_in")
# that are migration-defined constants, not human-entered personal data. The "name"
# pattern match is a false positive in this context — the values are always enum
# members of §15 catalog, never personal data. Consistent with the prior scan
# note: "KG entity identifier, not a personal-data field."
#
# ── RULE: missing_right_to_erasure ──
#
# PASS — compliance_delete (compliance-audit UC-01) is the structured right-to-
# erasure mechanism. It tombstones RawInformation.content (BR-04), cascades
# status='deleted' to derived rows (BR-06, BR-07), and covers the new
# original_input column added in v1.5.0 (ingestion.back.md BR-34). No user-
# account-deletion UC exists (single-owner, no User entity). No finding raised.
#
# ── RULE: missing_data_minimization ──
#
# PASS — No UC or BR collects fields beyond the declared purpose (knowledge
# extraction and graph construction). The new original_input column (ingestion
# v1.5.0) captures verbatim chat-turn input solely for provenance traceability
# (a declared system purpose per §13 / §18 / "rastreabilidade" principle). No
# excess data is collected.
#
# ── RULE: hardcoded_pii_in_spec_example ──
#
# FINDINGS CFND-001 / CFND-002 / CFND-003 — three domains
# Real-looking personal names appear in example: values in ingestion, compliance-
# audit, and query-retrieval OpenAPI schemas. These are add_warning findings —
# advisory, not blocking. The prior scan (compliance-report.yaml) flagged ingestion
# and compliance-audit (W-01, W-02); query-retrieval was missed. CFND-003 is a
# newly surfaced finding for query-retrieval. All three remain unfixed in the
# P2.1 wave.
#
# ── P2.1 SPECIFIC NOTE ──
#
# The P2.1 error-code taxonomy change itself introduces NO new LGPD structural
# gaps. The change is a pure wire-code rename (deprecated §14 short codes →
# namespaced codes) with no new personal-data fields, no new endpoints, no schema
# changes (beyond original_input which pre-dates P2.1 proper), and no audit-trail
# regressions. The byte-identical REST↔MCP parity contracts enforced by BR-14
# (compliance-audit), BR-32 (curation), TC-04 (knowledge-graph), and the new
# ingestion parity assertion are compliance-positive: they ensure audit records
# contain the same error codes regardless of transport.
#
# ── VERDICT ──
#
# compliant_with_crs: three add_warning findings (unfixed PII in examples — pre-
# existing, not introduced by P2.1) plus one create_spec_cr (CFND-004, pii_field_
# undeclared for ProposeNodeInput.name — add a data classification note). Handoff
# is not blocked. CRs must be opened before the next compliance scan.
