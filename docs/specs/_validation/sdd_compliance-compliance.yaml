#
# LGPD rules evaluated against NodeDetailPanel.component.spec.md v2.0.0.
# Scope: frontend component spec — read-only display of existing KG data.
#
# ── SINGLE-OWNER MODEL NOTE ──
#
# The system is single-owner by specification (v7 §2.3, A20). The Owner is both
# the operator and the sole data subject. LGPD obligations relating to third-party
# personal data processing do not arise. This note applies to all rules below.
#
# ── RULE: missing_data_retention_policy ──
#
# PASS — The component is entirely read-only (GET endpoints only: getNodeById,
# traverseNode depth=1, getProvenanceByLink, getProvenanceByAttribute). No new
# personal-data columns are created or stored. Data retention is governed by the
# ingestion and compliance-audit domain specs already cleared in prior scans.
#
# ── RULE: missing_consent_mechanism ──
#
# PASS — The component does not collect personal data. It reads and displays
# existing KG data to the single-owner operator. No consent mechanism is required.
#
# ── RULE: missing_audit_log ──
#
# PASS — All three phases (A/B/C) are read-only. The detection rule applies only
# to endpoints that create, modify, or delete sensitive data. No write operation
# is introduced by this spec.
#
# ── RULE: pii_field_undeclared ──
#
# PASS — Field names present in the spec's data layer:
#   received_at, fragment_text, source_type, source_label, chunk_index,
#   offset_start, offset_end, excerpt, canonical_name, confidence, valid_from,
#   valid_to, effective_status, metadata.title, metadata.document_date.
# None of these field names match the PII pattern list
# (email, name, phone, cpf, address, birth_date, ip_address).
# "canonical_name" contains "name" as a suffix; per the detection rule and
# consistent with the prior scan (CFND-001 rationale), "canonical_name" is a
# KG entity identifier, not a personal-data field. No gap.
#
# ── RULE: missing_right_to_erasure ──
#
# PASS — No new erasure surface is introduced. The spec explicitly handles the
# compliance-delete tombstone state: §3 "Success — lazy provenance tombstoned"
# and §7 Scenario 4 document the 410 BUSINESS_RAW_INFORMATION_DELETED response
# mapping to "Documento original removido por conformidade." with no retry
# button, indicating that the UI correctly surfaces the erasure outcome without
# attempting to bypass it.
#
# ── RULE: missing_data_minimization ──
#
# PASS — Phase C provenance data is fetched lazily (enabled gate on TanStack
# Query — only fires when the user explicitly expands "Ver origem completa").
# No pre-fetching of provenance occurs on mount, consistent with the Do/Don't
# table in §6. No excess data is collected beyond what the user requests.
#
# ── RULE: hardcoded_pii_in_spec_example ──
#
# PASS — This is a component spec, not an OpenAPI schema file; the detection
# rule applies to example: values in OpenAPI schemas. The BDD scenario text
# in §7 uses "Rodrigo" and "Apollo" as illustrative node labels in scenario
