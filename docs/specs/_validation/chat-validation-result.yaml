    source: "docs/specs/front/design-system/_index.md and docs/specs/front/design-system-rules.md"
    description: "Pre-existing issue from the TUI migration wave. Both files have a version header of 2.0.0 but their changelogs only go to 1.4.0 (_index.md) and 1.3.0 (design-system-rules.md) respectively. No changelog entry documents the 2.0.0 version bump (the UI-Kit migration that changed the header). This does not affect the content correctness of either file — the migration is described in the v2.0 warning block at the top of each file."
