    source: docs/specs/domains/query-retrieval/query-retrieval.spec.md §7
    description: >
      Bidirectional dependency naming inconsistency: query-retrieval.spec.md §7 lists peer
      domains `ingestion`, `knowledge-graph`, `curation`, `compliance` and expects them to
      list `query-retrieval` back. However, ingestion.spec.md §7 lists this domain as
