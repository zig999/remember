warnings:
  - id: WARN-003
    type: coverage
    source: docs/specs/front/features/chat.feature.spec.md (§2, §7)
    description: >
      The graph-improvement wave (REQ-1 floating edges + REQ-2 multi-algorithm layout) adds
      an interactive algorithm Select control to GraphCanvas (visible in the right-column 60%
      pane of /chat). This control is not reflected in chat.feature.spec.md §2 (no UI state
      update for algorithm-change interaction) nor in §7 (Select is not listed as a shared
      component used by this feature). The GraphSpace.component.spec.md covers it in §9
      (Scenario 8) but that component spec is not a substitute for feature-level state
      documentation. The missing coverage is a gap, not a blocker, because the algorithm
      select is internal to GraphCanvas (not a top-level chat feature concern) and
      GraphSpace.component.spec.md + design-system-rules.md §5.3 fully document it.
  - id: WARN-004
    type: bdd
    source: docs/specs/front/features/chat.feature.spec.md (§9)
    description: >
      chat.feature.spec.md §9 has 6 BDD scenarios. None of the existing scenarios cover the
      new algorithm-select interaction (switching from 'Força' to 'Árvore'/'Radial' in the
      right-column graph panel). Scenario 8 in GraphSpace.component.spec.md fills this gap
      at the component level, but no scenario exists at the feature level in
      chat.feature.spec.md §9. The minimum (2 scenarios — happy path + critical error) is
      satisfied (6 scenarios present), so this is warning-level not blocking.

