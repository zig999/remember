<!doctype html>
<html lang="pt-BR" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Remember</title>
    <!-- "Terminal Native" typography: Space Grotesk (titles) + Space Mono (body/UI). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap"
      rel="stylesheet"
    />
    <!--
      Dark-only app: `data-theme="dark"` is set statically on <html> above, so no
      pre-mount theme hydration script is needed (no FOUC by construction).
    -->
    <!--
      BR-15: the backdrop image is preloaded lazily (after critical render), via
      requestIdleCallback / setTimeout(0), so it never counts against the LCP budget.
    -->
    <script>
      (function () {
        function preloadBackdrop() {
          try {
            var link = document.createElement("link");
            link.rel = "preload";
            link.as = "image";
            link.href = "/backdrop/cityscape-dusk.png";
            document.head.appendChild(link);
          } catch (e) {
            // graceful — AmbientBackdrop falls back to a flat color via --color-primary
          }
        }
        if (typeof window.requestIdleCallback === "function") {
          window.requestIdleCallback(preloadBackdrop);
        } else {
          setTimeout(preloadBackdrop, 0);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
