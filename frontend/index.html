<!doctype html>
<html lang="pt-BR" data-theme="phosphor">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Remember</title>
    <!-- TUI phosphor/CRT: monospace everywhere (JetBrains Mono — first in the kit's --font-mono stack). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <!--
      Theme comes from the shared TUI kit: `data-theme="phosphor"` (kit default at
      :root) is set statically on <html> above; `data-theme="default"` switches to
      the kit's Terminal/Dracula palette. No pre-mount hydration script needed.
    -->
    <!--
      BR-15: the backdrop image is preloaded lazily (after critical render), via
      requestIdleCallback / setTimeout(0), so it never counts against the LCP budget.
    -->
    <script>
      (function () {
        function preloadBackdrop() {
          try {
            var link = document.createElement("link");
            link.rel = "preload";
            link.as = "image";
            link.href = "/backdrop/cityscape-dusk.png";
            document.head.appendChild(link);
          } catch (e) {
            // graceful — AmbientBackdrop falls back to a flat color via --color-primary
          }
        }
        if (typeof window.requestIdleCallback === "function") {
          window.requestIdleCallback(preloadBackdrop);
        } else {
          setTimeout(preloadBackdrop, 0);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
